[phases.setup]
nixPkgs = [
  "nodejs_20",
  "pnpm",
  "bubblewrap",
  "util-linux",
  "python313",
  "curl"
]

[phases.install]
cmds = [
  "pnpm install --frozen-lockfile",
  "curl -LsSf https://astral.sh/uv/install.sh | sh",
  "cd packages/python-sandbox && ~/.local/bin/uv sync --frozen"
]

[phases.build]
cmds = [
  "pnpm build"
]

[start]
cmd = "pnpm start"
